<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{RESTAURANT_NAME}} - 菜单</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="logo">
        <img src="{{LOGO_URL}}" alt="{{RESTAURANT_NAME}}">
        <h1>{{RESTAURANT_NAME}}</h1>
      </div>
      <button class="hamburger" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
      <nav class="nav">
        <a href="index.html">首页</a>
        <a href="menu.html" class="active">菜单</a>
        <a href="order.html">下单</a>
        <a href="contact.html">联系我们</a>
      </nav>
    </div>
  </header>

  <main class="menu-page">
    <div class="container">
      <h2 class="section-title">菜单</h2>
      <div data-menu-container></div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2024 {{RESTAURANT_NAME}} - Powered by Rose SaaS</p>
    </div>
  </footer>

  <button class="chat-btn" aria-label="在线客服">💬</button>

  <div class="chat-modal">
    <div class="chat-header">在线客服</div>
    <div class="chat-messages">
      <div class="chat-msg received">您好！欢迎光临 {{RESTAURANT_NAME}}，请问有什么可以帮您？</div>
    </div>
    <div class="chat-input-area">
      <input class="chat-input" type="text" placeholder="输入消息...">
      <button class="chat-send">发送</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
