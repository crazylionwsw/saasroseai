<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{RESTAURANT_NAME}} - 在线下单</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="logo">
        <img src="{{LOGO_URL}}" alt="{{RESTAURANT_NAME}}">
        <h1>{{RESTAURANT_NAME}}</h1>
      </div>
      <button class="hamburger" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
      <nav class="nav">
        <a href="index.html">首页</a>
        <a href="menu.html">菜单</a>
        <a href="order.html" class="active">下单</a>
        <a href="contact.html">联系我们</a>
      </nav>
    </div>
  </header>

  <main class="order-page">
    <div class="order-menu">
      <h2 class="section-title" style="text-align:left;margin-bottom:20px;">点餐</h2>
      <div data-menu-container></div>
    </div>

    <div class="cart-sticky">
      <div class="cart">
        <h3>购物车</h3>
        <div class="cart-items"></div>
        <div class="cart-total">
          <span>合计</span>
          <span class="cart-total-value">¥0.00</span>
        </div>
        <form class="order-form">
          <input type="text" name="name" placeholder="姓名 *" required>
          <input type="tel" name="phone" placeholder="电话 *" required>
          <input type="text" name="address" placeholder="地址 *" required>
          <textarea name="note" placeholder="备注（可选）"></textarea>
          <button type="submit" class="btn">提交订单</button>
        </form>
      </div>
    </div>
  </main>

  <div class="modal-overlay" id="orderModal">
    <div class="modal-box">
      <h3>下单成功</h3>
      <p>订单号：<span class="order-id">—</span></p>
      <p>总价：<span class="order-total">¥0.00</span></p>
      <p style="font-size:0.82rem;color:#999;margin-top:8px;font-weight:300;">感谢您的订单，我们会尽快为您准备</p>
      <button class="btn" onclick="this.closest('.modal-overlay').classList.remove('open')" style="margin-top:16px;">关闭</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
