<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{RESTAURANT_NAME}} - {{T:page_title_menu}}</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="logo">
        <img src="{{LOGO_URL}}" alt="{{RESTAURANT_NAME}}">
        <h1>{{RESTAURANT_NAME}}</h1>
      </div>
      <button class="hamburger" aria-label="{{T:nav_menu}}">
        <span></span><span></span><span></span>
      </button>
      <nav class="nav">
        <a href="index.html">{{T:nav_home}}</a>
        <a href="menu.html" class="active">{{T:nav_menu}}</a>
        <a href="order.html">{{T:nav_order}}</a>
        <a href="contact.html">{{T:nav_contact}}</a>
      </nav>
      <div class="lang-switch">
        <select onchange="switchLang(this.value)">
          <option value="zh" {{LANG_SELECTED_zh}}>中文</option>
          <option value="en" {{LANG_SELECTED_en}}>English</option>
          <option value="fr" {{LANG_SELECTED_fr}}>Français</option>
        </select>
      </div>
    </div>
  </header>

  <main class="menu-page">
    <div class="container">
      <h2 class="section-title">{{T:section_menu}}</h2>
      <div data-menu-container></div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; {{YEAR}} {{RESTAURANT_NAME}} - {{T:footer_powered}}</p>
    </div>
  </footer>

  <button class="chat-btn" aria-label="{{T:chat_title}}">💬</button>

  <div class="chat-modal">
    <div class="chat-header">{{T:chat_title}}</div>
    <div class="chat-messages">
      <div class="chat-msg received">{{T:chat_welcome}}</div>
    </div>
    <div class="chat-input-area">
      <input class="chat-input" type="text" placeholder="{{T:chat_placeholder}}">
      <button class="chat-send">{{T:chat_send}}</button>
    </div>
  </div>

  <div class="modal-overlay" id="orderModal">
    <div class="modal-box">
      <h3>{{T:order_added_title}}</h3>
      <p>{{T:order_added_desc}}</p>
      <a href="order.html" class="btn" style="margin-top:16px;">{{T:order_go_checkout}}</a>
    </div>
  </div>

  <script>
    window.TRANSLATIONS = {{TRANSLATIONS_JSON}};
    window.CURRENCY_SYMBOL = '{{CURRENCY_SYMBOL}}';
    window.LANG = '{{LANG}}';
    function switchLang(code) {
      var d = new Date();
      d.setTime(d.getTime() + 365*24*60*60*1000);
      document.cookie = 'lang=' + code + ';expires=' + d.toUTCString() + ';path=/';
      location.reload();
    }
  </script>
  <script src="app.js"></script>
</body>
</html>
